name: Build transGUI exe

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install lazarus
      run: |
        choco install lazarus -y --force

    - name: Find and add lazbuild to PATH
      run: |
        # Try multiple possible locations for lazbuild.exe
        $possiblePaths = @(
          "C:\ProgramData\chocolatey\lib\lazarus",
          "C:\Program Files (x86)\Lazarus",
          "C:\Program Files\Lazarus",
          "C:\users\runneradmin\AppData\Local\Programs\Lazarus"
        )
        
        $lazbuildPath = $null
        foreach ($path in $possiblePaths) {
          if (Test-Path $path) {
            $lazbuildPath = Get-ChildItem -Recurse -Filter "lazbuild.exe" -Path $path 2>$null | Select-Object -First 1 -ExpandProperty DirectoryName
            if ($lazbuildPath) { break }
          }
        }
        
        if (-not $lazbuildPath) {
          # Search entire C drive as fallback
          $lazbuildPath = Get-ChildItem -Recurse -Filter "lazbuild.exe" -Path "C:\" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty DirectoryName
        }
        
        if ($lazbuildPath) {
          echo "$lazbuildPath" >> $env:GITHUB_PATH
          Write-Host "Found lazbuild.exe at: $lazbuildPath"
        } else {
          echo "lazbuild.exe not found"
          exit 1
        }

    - name: Compile transGUI
      run: |
        lazbuild main.pas

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: transgui-binary
        path: ./transgui.exe
